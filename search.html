<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search order</title>

    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header class="header">
        <div class="header__inner container">
            <div class="header__body">
                <a href="/" class="header__body-logo h1">Kwork<span>Filter</span></a>
                <nav class="header__menu">
                    <ul class="header__menu-list">
                        <li class="header__menu-item">
                            <a href="/" class="header__menu-link">Главная</a>
                        </li>
                        <li class="header__menu-item">
                            <a href="search.html" class="header__menu-link">Поиск заказов</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="skills">
            <h2 class="skills__title">Настройте фильтры для поиска</h2>
            <form class="skills__form" onsubmit="event.preventDefault();">
                <input type="text" class="skills__input" placeholder="Введите навыки через запятую (python, django, ...)">
                <button type="submit" class="skills__btn-submit">Обновить</button>
            </form>
            <div class="skills__tags">
                <span class="chip">#python <span class="chip__close">&times;</span></span>
                <span class="chip">#django <span class="chip__close">&times;</span></span>
                <span class="chip">#api <span class="chip__close">&times;</span></span>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer__inner container">
            <p class="footer__text">&copy; 2026 KworkFilter. Все права защищены.</p>
        </div>
    </footer>

    <script src="scripts/nav-list.js"></script>
</body>
</html>
